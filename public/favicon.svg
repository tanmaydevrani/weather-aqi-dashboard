<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg-grad)"/>

  <!-- Sun -->
  <circle cx="22" cy="22" r="8" fill="#FFD60A"/>
  <g stroke="#FFD60A" stroke-width="2" stroke-linecap="round">
    <line x1="22" y1="9"  x2="22" y2="6"/>
    <line x1="22" y1="35" x2="22" y2="38"/>
    <line x1="9"  y1="22" x2="6"  y2="22"/>
    <line x1="35" y1="22" x2="38" y2="22"/>
    <line x1="13" y1="13" x2="11" y2="11"/>
    <line x1="31" y1="31" x2="33" y2="33"/>
    <line x1="31" y1="13" x2="33" y2="11"/>
    <line x1="13" y1="31" x2="11" y2="33"/>
  </g>

  <!-- Cloud body -->
  <circle cx="37" cy="44" r="10" fill="white" opacity="0.95"/>
  <circle cx="26" cy="47" r="8"  fill="white" opacity="0.95"/>
  <circle cx="47" cy="46" r="8"  fill="white" opacity="0.95"/>
  <circle cx="37" cy="37" r="7"  fill="white" opacity="0.95"/>
  <!-- Fill the bottom gap -->
  <rect x="19" y="44" width="36" height="12" fill="white" opacity="0.95"/>
